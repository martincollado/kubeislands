{{- if .Values.networkPolicy.enabled }}
# Allow frontend → engine on port 8081
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kubeislands.fullname" . }}-engine
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeislands.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: engine
      {{- include "kubeislands.selectorLabels" . | nindent 6 }}
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: frontend
              {{- include "kubeislands.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8081
---
# Allow inbound to frontend on port 8080
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kubeislands.fullname" . }}-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeislands.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: frontend
      {{- include "kubeislands.selectorLabels" . | nindent 6 }}
  policyTypes: [Ingress]
  ingress:
    - ports:
        - protocol: TCP
          port: 8080
{{- end }}
