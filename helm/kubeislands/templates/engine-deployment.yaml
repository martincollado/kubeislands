apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubeislands.engine.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeislands.labels" . | nindent 4 }}
    app.kubernetes.io/component: engine
spec:
  replicas: {{ .Values.engine.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "kubeislands.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: engine
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "kubeislands.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: engine
    spec:
      serviceAccountName: {{ include "kubeislands.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
      containers:
        - name: engine
          image: "{{ .Values.engine.image.repository }}:{{ .Values.engine.image.tag }}"
          imagePullPolicy: {{ .Values.engine.image.pullPolicy }}
          ports:
            - name: ws
              containerPort: 8081
              protocol: TCP
          env:
            - name: WATCH_NAMESPACES
              value: {{ .Values.engine.watchNamespaces | quote }}
            - name: RESYNC_SECONDS
              value: {{ .Values.engine.resyncSeconds | quote }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            {{- toYaml .Values.engine.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
