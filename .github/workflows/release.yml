name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write
  id-token: write  # cosign keyless

env:
  REGISTRY: ghcr.io
  ENGINE_IMAGE: ghcr.io/${{ github.repository_owner }}/kubeislands-engine
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/kubeislands-frontend

jobs:
  release-images:
    name: Build & push images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "commit=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Engine image metadata
        id: engine-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ENGINE_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build & push engine
        id: engine-push
        uses: docker/build-push-action@v6
        with:
          context: engine
          file: engine/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.engine-meta.outputs.tags }}
          labels: ${{ steps.engine-meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            COMMIT=${{ steps.version.outputs.commit }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Frontend image metadata
        id: frontend-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build & push frontend
        id: frontend-push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.frontend-meta.outputs.tags }}
          labels: ${{ steps.frontend-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign engine image (keyless)
        run: cosign sign --yes ${{ env.ENGINE_IMAGE }}@${{ steps.engine-push.outputs.digest }}

      - name: Sign frontend image (keyless)
        run: cosign sign --yes ${{ env.FRONTEND_IMAGE }}@${{ steps.frontend-push.outputs.digest }}

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate engine SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.ENGINE_IMAGE }}@${{ steps.engine-push.outputs.digest }}
          artifact-name: sbom-engine.spdx.json
          output-file: /tmp/sbom-engine.spdx.json

      - name: Generate frontend SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.FRONTEND_IMAGE }}@${{ steps.frontend-push.outputs.digest }}
          artifact-name: sbom-frontend.spdx.json
          output-file: /tmp/sbom-frontend.spdx.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            /tmp/sbom-engine.spdx.json
            /tmp/sbom-frontend.spdx.json

  release-chart:
    name: Publish Helm chart
    runs-on: ubuntu-latest
    needs: release-images
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - uses: azure/setup-helm@v4

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          charts_dir: helm
