name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
categories:
  - title: "New Features"
    labels: [type/feature]
  - title: "Bug Fixes"
    labels: [type/bug]
  - title: "Security"
    labels: [type/security]
  - title: "Documentation"
    labels: [area/docs]
  - title: "Dependencies"
    labels: [dependencies]
  - title: "Other"
    labels: [chore]
change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
version-resolver:
  major:
    labels: [breaking]
  minor:
    labels: [type/feature]
  patch:
    labels: [type/bug, type/security, dependencies]
  default: patch
